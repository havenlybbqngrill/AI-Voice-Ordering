<!DOCTYPE html>
<html>
<head>
  <title>Outwater Grill - Kitchen Dashboard</title>
  <style>
    body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
    .order { background: #333; padding: 15px; margin: 10px 0; border-radius: 5px; }
    h1 { color: #4CAF50; }
  </style>
</head>
<body>
  <h1>🍳 Outwater Grill Kitchen Orders</h1>
  <div id="orders"></div>
  <script>
    const ws = new WebSocket('ws://' + window.location.host);
    ws.onmessage = (e) => {
      document.getElementById('orders').innerHTML = e.data;
    };
  </script>
</body>
</html>
